name: Build Release Plugin Platform

on:
  workflow_call:
    inputs:
      platform_name:
        required: true
        type: string
      runner:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Download build info
        uses: actions/download-artifact@v4
        with:
          name: release-build-info
          path: release

      - name: Select platform build info
        run: |
          node -e "const fs = require('fs'); fs.copyFileSync('release/build-info.${{ inputs.platform_name }}.json', 'release/build-info.json')"

      - name: Install dependencies
        run: npm install

      - name: Build plugins
        run: node scripts/build-plugins.js

      - name: Upload plugin packages
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.platform_name }}-plugin-packages
          path: release/*.zip
          if-no-files-found: error
